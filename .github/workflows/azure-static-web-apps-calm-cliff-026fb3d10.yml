name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}

      - name: Smoke test exported site
        run: npm run smoke

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_CLIFF_026FB3D10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "out"    # when skip_app_build is true, app_location must be the pre-built output dir
          api_location: ""
          output_location: ""
          skip_app_build: true

  build_pr:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build PR
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test exported site
        run: npm run smoke

      - name: Lint
        run: npm run lint

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-out
          path: out/
          retention-days: 1

  deploy_preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Deploy Preview
    needs: build_pr
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-out
          path: out/

      - name: Deploy preview to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_CLIFF_026FB3D10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "out"
          api_location: ""
          output_location: ""
          skip_app_build: true

  lighthouse:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Lighthouse
    needs: build_pr
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-out
          path: out/

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.js
          temporaryPublicStorage: true
        continue-on-error: true

      - name: Comment PR with Lighthouse results
        if: always()
        uses: actions/github-script@v7
        env:
          MANIFEST: ${{ steps.lhci.outputs.manifest }}
          LINKS: ${{ steps.lhci.outputs.links }}
        with:
          script: |
            const manifest = JSON.parse(process.env.MANIFEST || '[]');
            const links = JSON.parse(process.env.LINKS || '{}');

            const fmt = (val) => {
              const pct = Math.round(val * 100);
              const icon = pct >= 90 ? '🟢' : pct >= 80 ? '🟡' : '🔴';
              return `${icon} ${pct}`;
            };

            const rows = manifest.map((r) => {
              const path = new URL(r.url).pathname.replace(/\.html$/, '');
              const link = links[r.url];
              const s = r.summary;
              const label = link ? `[\`${path}\`](${link})` : `\`${path}\``;
              return `| ${label} | ${fmt(s.performance)} | ${fmt(s.accessibility)} | ${fmt(s['best-practices'])} | ${fmt(s.seo)} |`;
            });

            const passed = '${{ steps.lhci.outcome }}' === 'success';
            const status = passed ? '✅ All checks passed' : '❌ One or more checks failed';

            const body = [
              '## Lighthouse Report',
              '',
              status,
              '',
              '| URL | Performance | Accessibility | Best Practices | SEO |',
              '|-----|:-----------:|:-------------:|:--------------:|:---:|',
              ...rows,
              '',
              '_🟢 ≥ 90 · 🟡 ≥ 80 · 🔴 < 80 — Performance gate: 80, all others: 90_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith('## Lighthouse Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if Lighthouse checks did not pass
        if: steps.lhci.outcome == 'failure'
        run: exit 1

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CALM_CLIFF_026FB3D10 }}
          action: "close"
          skip_deploy_on_missing_secrets: true
